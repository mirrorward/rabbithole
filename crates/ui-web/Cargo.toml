[package]
name = "rabbithole-ui-web"
description = "Leptos wasm SPA: client UI, embedded web client, and web admin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish.workspace = true

[dependencies]
leptos.workspace = true
leptos_router.workspace = true
# rabbithole-core WITHOUT the "native" feature: this crate must stay
# wasm-clean (no tokio / net / store-client pulled in).
rabbithole-core.workspace = true
rabbithole-proto.workspace = true
# CP437/ANSI cell + palette model reused by `src/art.rs`. Pure Rust (its only
# dependency is `png`), so it stays wasm-clean and we avoid duplicating the
# ANSI parser that already lives here.
rabbithole-art.workspace = true
# Theme-pack token files: packs round-trip as JSON (`src/packs.rs`) — the seam
# a future server theme bundle plugs into. Both wasm-clean.
serde.workspace = true
serde_json.workspace = true
# Portable identity (`src/identity.rs`): a persisted Ed25519 keypair that names
# "you" across burrows. Just the curve + a blake3/hex fingerprint — no argon2 or
# totp (so we don't pull rabbithole-identity's heavier tree into wasm).
ed25519-dalek.workspace = true
blake3.workspace = true
hex.workspace = true

# The browser WebSocket transport (`src/ws.rs`) plus the wasm-only DOM glue in
# `src/art.rs` (canvas) and `src/theme.rs` (localStorage / matchMedia). These
# deps are target-gated so the host build (`cargo test`, `cargo clippy`) never
# pulls them in and stays wasm-clean.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
js-sys.workspace = true
# Extra features (canvas + storage + OS colour-scheme query) are additive on
# top of the workspace-defined set, so the root `Cargo.toml` is untouched.
web-sys = { workspace = true, features = [
    "Window",
    "Storage",
    "MediaQueryList",
    "HtmlCanvasElement",
    "CanvasRenderingContext2d",
    # The radio player (`src/player.rs`): a detached <audio> element playing
    # the Icecast delivery mount. Media controls live on HtmlMediaElement.
    "HtmlAudioElement",
    "HtmlMediaElement",
    # PWA install-readiness (`src/pwa.rs`): navigator.serviceWorker.register.
    "Navigator",
    "ServiceWorkerContainer",
    # Route-change focus management (`src/a11y.rs`):
    # document.getElementById(...).focus(), so keyboard and screen-reader
    # users land on the new view's <h1> after client-side navigation.
    "Document",
    "Element",
    "HtmlElement",
    # File download save (`src/ws.rs::save_download`): a FileContent reply's
    # bytes are wrapped in a Blob + object URL and clicked via a detached
    # <a download>.
    "Blob",
    "BlobPropertyBag",
    "Url",
    "HtmlAnchorElement",
    # Portable identity seed generation (`src/identity.rs`):
    # crypto.getRandomValues into a 32-byte buffer.
    "Crypto",
    # Auto-reconnect on load (`src/app.rs`): history.replaceState to land in the
    # lobby (not the login screen) after restoring persisted burrow sessions.
    "History",
] }
gloo-timers.workspace = true
# The Ed25519 seed comes from the browser CSPRNG (web-sys Crypto), so the curve
# never needs an RNG; getrandom's js backend satisfies any transitive wasm
# requirement at compile time.
getrandom = { version = "0.2", features = ["js"] }

# Host-only: the `#[ignore]`d icon regenerator and the icons-match-generator
# test in `src/pwa.rs` encode/decode the checked-in PNGs. Pure Rust, and a
# dev-dependency, so the shipped wasm bundle never carries it.
[dev-dependencies]
png.workspace = true
