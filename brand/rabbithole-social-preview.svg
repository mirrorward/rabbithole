    <path d="M149 164c36-54 125-47 154 11 33 64-33 130-98 109-49-16-62-75-23-105 29-22 72-6 74 30 1 25-20 40-44 33" fill="none" stroke="#020617" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
