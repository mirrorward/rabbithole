  <rect width="1280" height="640" rx="0" fill="url(#background)"/>
  <path d="M0 515c148-47 264-31 406 29 190 81 351 74 539-19 126-62 231-73 335-37v152H0z" fill="#38d6bf" opacity="0.08"/>
  <g transform="translate(96 64)">
