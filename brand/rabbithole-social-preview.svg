<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">RabbitHole GitHub social preview</title>
  <desc id="desc">RabbitHole logo and project name on a dark branded background.</desc>
  <defs>
