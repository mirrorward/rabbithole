name: Release

# Build and publish per-platform release artifacts when a version tag is pushed.
# Deliberately NOT triggered on normal branch pushes or pull requests.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            musl: true
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binaries
        run: >
          cargo build --release --target ${{ matrix.target }}
          -p burrow -p rabbit -p rabbit-tui -p looking-glass

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          ext="${{ matrix.ext }}"
          pkg="rabbithole-${version}-${target}"

          sha256() {
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "$@";
            else shasum -a 256 "$@"; fi
          }

          mkdir -p "dist/${pkg}"
          for bin in burrow rabbit rabbit-tui looking-glass; do
            src="target/${target}/release/${bin}${ext}"
            cp "$src" "dist/${pkg}/"
            if [ -z "${ext}" ]; then
              strip "dist/${pkg}/${bin}${ext}" || true
            fi
          done
          cp README.md "dist/${pkg}/" 2>/dev/null || true

          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${pkg}.zip" "${pkg}" >/dev/null
            sha256 "${pkg}.zip" > "${pkg}.zip.sha256"
          else
            tar czf "${pkg}.tar.gz" "${pkg}"
            sha256 "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
          fi

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          fail_on_unmatched_files: true
